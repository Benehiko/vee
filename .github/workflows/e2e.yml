name: E2E

on:
  workflow_dispatch:
    inputs:
      distro:
        description: "Distro to test (ubuntu, arch, fedora)"
        required: false
        default: "ubuntu"

jobs:
  e2e:
    runs-on: [self-hosted, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build vee
        run: go build -mod=vendor -o vee .

      - name: Run e2e tests
        env:
          VEE_E2E: "1"
          VEE_BIN: "${{ github.workspace }}/vee"
        run: go test -mod=vendor -v -timeout 20m -tags e2e ./e2e/...
