baseURL = "https://benehiko.github.io/vee/"
languageCode = "en-us"
title = "vee"

[module]
  [[module.imports]]
    path = "github.com/thegeeklab/hugo-geekdoc"

[params]
  description = "A command-line VM manager built on QEMU/KVM"
  geekdocRepo = "https://github.com/Benehiko/vee"
  geekdocEditPath = "edit/main/site/content"
  geekdocSearch = true
  geekdocSearchShowParent = true
  geekdocDarkModeToggle = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "monokai"
