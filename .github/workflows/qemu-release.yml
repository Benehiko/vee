name: Build and release vee-qemu

on:
  workflow_dispatch:
    inputs:
      qemu_version:
        description: "QEMU upstream version (e.g. 9.2.3)"
        required: true
        default: "9.2.3"
      vee_suffix:
        description: "vee build suffix (e.g. vee1)"
        required: true
        default: "vee1"

jobs:
  build:
    name: Build vee-qemu (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            qemu_target: x86_64-softmmu
          - arch: arm64
            goarch: arm64
            qemu_target: x86_64-softmmu

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set release tag
        id: tag
        run: echo "tag=qemu-${{ inputs.qemu_version }}-${{ inputs.vee_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Build QEMU with OpenGL/virgl/SPICE
        run: |
          docker run --rm \
            -v "$PWD/build:/output" \
            --platform linux/${{ matrix.arch }} \
            ubuntu:24.04 bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                build-essential git python3 python3-pip ninja-build pkg-config \
                libglib2.0-dev libpixman-1-dev libslirp-dev \
                libsdl2-dev libgtk-3-dev \
                libvirglrenderer-dev libepoxy-dev \
                libspice-server-dev libspice-protocol-dev \
                libusb-1.0-0-dev libusbredirhost-dev \
                libaio-dev liburing-dev \
                curl ca-certificates

              QEMU_VER="${{ inputs.qemu_version }}"
              curl -fsSL "https://download.qemu.org/qemu-${QEMU_VER}.tar.xz" -o qemu.tar.xz
              tar xf qemu.tar.xz
              cd "qemu-${QEMU_VER}"

              ./configure \
                --prefix=/usr/local \
                --target-list=${{ matrix.qemu_target }} \
                --enable-opengl \
                --enable-virglrenderer \
                --enable-sdl \
                --enable-gtk \
                --enable-spice \
                --enable-usb-redir \
                --enable-slirp \
                --enable-kvm \
                --disable-docs \
                --disable-debug-info

              make -j"$(nproc)"
              make install DESTDIR=/tmp/qemu-install

              mkdir -p /output
              cp /tmp/qemu-install/usr/local/bin/qemu-system-x86_64 /output/
            '

      - name: Package binary
        run: |
          mkdir -p dist
          ASSET="qemu-system-x86_64-linux-${{ matrix.goarch }}"
          cp build/qemu-system-x86_64 dist/qemu-system-x86_64
          chmod +x dist/qemu-system-x86_64
          cd dist
          tar czf "${ASSET}.tar.gz" qemu-system-x86_64
          sha256sum "${ASSET}.tar.gz" > "${ASSET}.tar.gz.sha256"
          echo "asset=${ASSET}.tar.gz" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-linux-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=qemu-${{ inputs.qemu_version }}-${{ inputs.vee_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "vee-qemu ${{ inputs.qemu_version }}-${{ inputs.vee_suffix }}"
          body: |
            Custom QEMU ${{ inputs.qemu_version }} build for vee gaming VMs.

            **Enabled features:** OpenGL · virglrenderer · SDL2 · GTK3 · SPICE · USB redir · KVM · slirp

            After publishing this release, update `internal/qemubin/version.go`:
            ```go
            const PinnedVersion = "${{ steps.tag.outputs.tag }}"

            var Checksums = map[string]string{
                "linux-amd64": "<sha256 from qemu-system-x86_64-linux-amd64.tar.gz.sha256>",
                "linux-arm64": "<sha256 from qemu-system-x86_64-linux-arm64.tar.gz.sha256>",
            }
            ```
          files: dist/*
          draft: false
          prerelease: false
