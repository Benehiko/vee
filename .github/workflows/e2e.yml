name: E2E

on:
  workflow_dispatch:
    inputs:
      distro:
        description: "Distro to test (ubuntu, arch, fedora)"
        required: false
        default: "ubuntu"

jobs:
  e2e:
    runs-on: [self-hosted, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build vee
        run: go build -mod=vendor -o vee .

      - name: Run e2e tests
        env:
          VEE_E2E: "1"
          VEE_BIN: "${{ github.workspace }}/vee"
        run: go test -mod=vendor -v -timeout 20m -tags e2e ./e2e/...
