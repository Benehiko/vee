version: "2"

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Benehiko/vee
    gofumpt:
      extra-rules: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gosec
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - contextcheck
    - nilerr
    - gocritic
    - godot
    - misspell
    - whitespace
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

run:
  timeout: 5m
  modules-download-mode: vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
