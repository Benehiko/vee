name: Build and release vee-qemu

on:
  workflow_dispatch:
    inputs:
      qemu_version:
        description: "QEMU upstream version (e.g. 10.0.2)"
        required: true
        default: "10.0.2"
      vee_suffix:
        description: "vee build suffix (e.g. vee1)"
        required: true
        default: "vee1"

jobs:
  build:
    name: Build vee-qemu (${{ matrix.arch }})
    # Each arch builds on a native runner so the QEMU compile is not emulated:
    # amd64 on the x86_64 ubuntu runner, arm64 on the native ARM64 runner. This
    # avoids the very slow (and binfmt-fragile) emulated cross-arch container.
    runs-on: ${{ matrix.runner }}
    strategy:
      # One leg failing must not cancel the others — each platform bundle is an
      # independent release asset.
      fail-fast: false
      matrix:
        include:
          # qemu_bin is the emulator binary that target-list produces; vee names
          # its bundle after the guest arch native to the host arch (x86_64 on
          # amd64, aarch64 on arm64).
          - arch: amd64
            goarch: amd64
            runner: ubuntu-latest
            qemu_target: x86_64-softmmu
            qemu_bin: qemu-system-x86_64
          - arch: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm
            qemu_target: aarch64-softmmu
            qemu_bin: qemu-system-aarch64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set release tag
        id: tag
        run: echo "tag=qemu-${{ inputs.qemu_version }}-${{ inputs.vee_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Build QEMU with OpenGL/virgl/SPICE
        run: |
          docker run --rm \
            -v "$PWD/build:/output" \
            --platform linux/${{ matrix.arch }} \
            ubuntu:24.04 bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                build-essential git python3 python3-pip ninja-build pkg-config \
                libglib2.0-dev libpixman-1-dev libslirp-dev \
                libsdl2-dev libgtk-3-dev \
                libvirglrenderer-dev libepoxy-dev \
                libspice-server-dev libspice-protocol-dev \
                libusb-1.0-0-dev libusbredirhost-dev \
                libaio-dev liburing-dev \
                curl ca-certificates

              QEMU_VER="${{ inputs.qemu_version }}"
              curl -fsSL "https://download.qemu.org/qemu-${QEMU_VER}.tar.xz" -o qemu.tar.xz
              tar xf qemu.tar.xz
              cd "qemu-${QEMU_VER}"

              ./configure \
                --prefix=/usr/local \
                --target-list=${{ matrix.qemu_target }} \
                --enable-opengl \
                --enable-virglrenderer \
                --enable-sdl \
                --enable-gtk \
                --enable-spice \
                --enable-usb-redir \
                --enable-slirp \
                --enable-kvm \
                --disable-docs \
                --disable-debug-info

              make -j"$(nproc)"
              make install DESTDIR=/tmp/qemu-install

              mkdir -p /output
              cp "/tmp/qemu-install/usr/local/bin/${{ matrix.qemu_bin }}" /output/
              # Copy the QEMU datadir (pc-bios incl. the edk2 UEFI firmware) out
              # of the container to the bind-mounted /output. make install writes
              # it inside the container FS; only /output survives. The host runner
              # stages + decompresses it below.
              cp -R /tmp/qemu-install/usr/local/share/qemu /output/qemu-share
              # Copy the GPLv2 license text (and per-component summary) out of the
              # source tree so the host can ship it in the bundle (GPLv2 §1/§3).
              # CWD is already the extracted qemu-${QEMU_VER} source dir.
              cp COPYING /output/COPYING
              [ -f LICENSE ] && cp LICENSE /output/LICENSE || true
            '

      - name: Package binary
        env:
          CONFIGURE_FLAGS: >-
            --target-list=${{ matrix.qemu_target }} --enable-opengl
            --enable-virglrenderer --enable-sdl --enable-gtk --enable-spice
            --enable-usb-redir --enable-slirp --enable-kvm --disable-docs
            --disable-debug-info
        run: |
          # Bundle layout (bin/, share/qemu) matches what vee's qemubin extracts
          # into ~/.vee. The asset name must match qemubin.AssetName():
          # <qemu-system-arch>-linux-<goarch>.tar.gz.
          QEMU_BIN="${{ matrix.qemu_bin }}"
          mkdir -p dist bundle/bin bundle/share
          ASSET="${QEMU_BIN}-linux-${{ matrix.goarch }}"
          cp "build/${QEMU_BIN}" "bundle/bin/${QEMU_BIN}"
          chmod +x "bundle/bin/${QEMU_BIN}"
          # Ship the QEMU datadir so vee needs no distro OVMF package. Decompress
          # the edk2 firmware vee probes for (bz2 -> plain .fd); vee's runtime
          # extractBundle does not handle bz2, so it must be plain here. Firmware
          # names differ by guest arch (x86_64 has a Secure Boot variant; aarch64
          # does not).
          cp -R build/qemu-share bundle/share/qemu
          case "${{ matrix.goarch }}" in
            amd64) FIRMWARES="edk2-x86_64-code edk2-x86_64-secure-code edk2-i386-vars" ;;
            arm64) FIRMWARES="edk2-aarch64-code edk2-arm-vars" ;;
            *)     FIRMWARES="" ;;
          esac
          for fw in $FIRMWARES; do
            if [ -f "bundle/share/qemu/${fw}.fd.bz2" ] && [ ! -f "bundle/share/qemu/${fw}.fd" ]; then
              bunzip2 -k "bundle/share/qemu/${fw}.fd.bz2"
            fi
          done
          # GPLv2 compliance: ship COPYING + SOURCE.txt in the bundle. Stage the
          # license text extracted from the source tree so the helper finds it.
          mkdir -p srcmeta
          cp build/COPYING srcmeta/COPYING
          [ -f build/LICENSE ] && cp build/LICENSE srcmeta/LICENSE || true
          # shellcheck disable=SC2086 # CONFIGURE_FLAGS must word-split into separate args
          bash scripts/qemu-bundle-license.sh bundle srcmeta "${{ inputs.qemu_version }}" $CONFIGURE_FLAGS
          ( cd bundle && tar czf "../dist/${ASSET}.tar.gz" bin share )
          ( cd dist && sha256sum "${ASSET}.tar.gz" > "${ASSET}.tar.gz.sha256" )
          echo "asset=${ASSET}.tar.gz" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-linux-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-macos:
    name: Build vee-qemu (darwin-arm64)
    # Apple Silicon runner: HVF + cocoa + virglrenderer/ANGLE are arm64/macOS only.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build virgl-capable QEMU bundle
        env:
          QEMU_VERSION: ${{ inputs.qemu_version }}
          VEE_SUFFIX: ${{ inputs.vee_suffix }}
        run: bash scripts/build-qemu-macos.sh

      - name: Show checksum
        run: cat dist/*.sha256 >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-darwin-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-windows:
    name: Build vee-qemu (windows-amd64)
    # Cross-compiled from Linux with MinGW-w64; --enable-whpx targets the Windows
    # Hypervisor Platform. No Windows runner needed. Built inside a Fedora
    # container: Fedora ships the full mingw64-* stack (glib2, pixman, SDL2, …)
    # that Ubuntu/Debian lack, and it is what QEMU's own upstream CI uses to
    # cross-build the Windows binary.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build WHPX-capable QEMU bundle (MinGW cross)
        run: |
          docker run --rm \
            -v "$PWD:/src" -w /src \
            fedora:43 bash -c '
              set -euo pipefail
              QEMU_VERSION="${{ inputs.qemu_version }}" \
              VEE_SUFFIX="${{ inputs.vee_suffix }}" \
              bash scripts/build-qemu-windows.sh
            '

      - name: Show checksum
        run: cat dist/*.sha256 >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-windows-amd64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Create GitHub Release
    needs: [build, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=qemu-${{ inputs.qemu_version }}-${{ inputs.vee_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "vee-qemu ${{ inputs.qemu_version }}-${{ inputs.vee_suffix }}"
          body: |
            Custom QEMU ${{ inputs.qemu_version }} build for vee.

            **Linux (x86_64):** OpenGL · virglrenderer · SDL2 · GTK3 · SPICE · USB redir · KVM · slirp
            **macOS (aarch64, Apple Silicon):** self-contained bundle with cocoa · OpenGL · virglrenderer (ANGLE/Metal) · MoltenVK (Venus) · HVF, code-signed with the hypervisor entitlement
            **Windows (x86_64):** WHPX · slirp, MinGW-cross-built with bundled runtime DLLs (accelerated CPU + 2D; the GL/SPICE stack is not yet cross-built for Windows)

            Assets are bundles (bin/, lib/, share/) extracted into ~/.vee by vee's qemubin package. Each bundle ships QEMU's datadir under share/qemu, including the edk2/OVMF UEFI firmware (decompressed to plain .fd), so no distro OVMF package or Homebrew QEMU is required.

            ### License

            QEMU is licensed under the **GNU General Public License, version 2
            (GPLv2-only)**. Each bundle ships the full license text and a
            corresponding-source pointer under `share/licenses/qemu/`
            (`COPYING` + `SOURCE.txt`). The complete corresponding source is the
            upstream tarball `https://download.qemu.org/qemu-${{ inputs.qemu_version }}.tar.xz`
            plus any patches noted in `SOURCE.txt`, reproducible via the build
            scripts in this repository. **Written offer:** for three years the
            vee maintainers will, on request (open a GitHub issue), provide the
            complete corresponding source for the cost of distribution.

            After publishing this release, update `internal/qemubin/version.go`:
            ```go
            const PinnedVersion = "${{ steps.tag.outputs.tag }}"

            var Checksums = map[string]string{
                "linux-amd64":   "<sha256 from qemu-system-x86_64-linux-amd64.tar.gz.sha256>",
                "linux-arm64":   "<sha256 from qemu-system-x86_64-linux-arm64.tar.gz.sha256>",
                "darwin-arm64":  "<sha256 from qemu-system-aarch64-darwin-arm64.tar.gz.sha256>",
                "windows-amd64": "<sha256 from qemu-system-x86_64-windows-amd64.tar.gz.sha256>",
            }
            ```
          files: dist/*
          draft: false
          prerelease: false
