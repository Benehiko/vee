name: Release

# Cut a release when a v* tag is pushed. Builds the vee binary for every
# supported host (linux + macOS + windows), then publishes a GitHub Release
# whose body lists the commits since the previous tag.
#
# Windows (windows/amd64) uses the WHPX accelerator and a build-tag split that
# swaps POSIX-only paths (vsock, VFIO, setsid, unix control sockets) for Windows
# equivalents or no-ops. Linux-only features (VFIO passthrough, virtiofsd,
# swtpm, the systemd daemon) degrade gracefully there.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build vee (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-15
          - goos: darwin
            goarch: arm64
            runner: macos-15
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/Benehiko/vee/cmd"
          LDFLAGS="-s -w \
            -X ${PKG}.version=${VERSION} \
            -X ${PKG}.commit=${COMMIT} \
            -X ${PKG}.date=${DATE}"
          BIN=vee
          if [ "${GOOS}" = "windows" ]; then BIN=vee.exe; fi
          go build -mod=vendor -trimpath -ldflags "${LDFLAGS}" -o "${BIN}" .

      - name: Package binary
        id: package
        run: |
          mkdir -p dist
          ASSET="vee-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          BIN=vee
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN=vee.exe; fi
          tar czf "dist/${ASSET}.tar.gz" "${BIN}" LICENSE README.md THIRD_PARTY_LICENSES
          ( cd dist && shasum -a 256 "${ASSET}.tar.gz" > "${ASSET}.tar.gz.sha256" )

          # Also publish an unversioned copy so the install docs can use
          # stable `releases/latest/download/vee-<os>-<arch>.tar.gz` URLs.
          UNVERSIONED="vee-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp "dist/${ASSET}.tar.gz" "dist/${UNVERSIONED}.tar.gz"
          ( cd dist && shasum -a 256 "${UNVERSIONED}.tar.gz" > "${UNVERSIONED}.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vee-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so we can diff against the previous tag for the changelog.
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "## What's changed"
            echo
            if [ -n "${PREV}" ]; then
              echo "Commits since \`${PREV}\`:"
              echo
              git log --no-merges --pretty='- %s (%h)' "${PREV}..${TAG}"
              RANGE="${PREV}...${TAG}"
            else
              echo "Commits in this release:"
              echo
              git log --no-merges --pretty='- %s (%h)' "${TAG}"
              RANGE=""
            fi
            echo
            if [ -n "${RANGE}" ]; then
              echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/${RANGE}"
            fi
            echo
            echo "---"
            echo
            echo "## Install"
            echo
            echo "Download the asset for your platform, **verify the checksum**, and put \`vee\` on your \`PATH\`. vee drives QEMU, so install your host's QEMU packages too — see the [Installation guide](https://vee.benehiko.com/getting-started/installation/)."
            echo
            REL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
            echo "### Linux"
            echo
            echo '```sh'
            echo "curl -LO ${REL}/vee-${TAG}-linux-amd64.tar.gz          # or linux-arm64"
            echo "curl -LO ${REL}/vee-${TAG}-linux-amd64.tar.gz.sha256"
            echo "sha256sum -c vee-${TAG}-linux-amd64.tar.gz.sha256"
            echo "tar xzf vee-${TAG}-linux-amd64.tar.gz"
            echo 'install -Dm755 vee "$HOME/.vee/bin/vee"'
            echo '```'
            echo
            echo "### macOS (Apple Silicon)"
            echo
            echo '```sh'
            echo "curl -LO ${REL}/vee-${TAG}-darwin-arm64.tar.gz         # Intel: darwin-amd64"
            echo "curl -LO ${REL}/vee-${TAG}-darwin-arm64.tar.gz.sha256"
            echo "shasum -a 256 -c vee-${TAG}-darwin-arm64.tar.gz.sha256"
            echo "tar xzf vee-${TAG}-darwin-arm64.tar.gz"
            echo 'install -Dm755 vee "$HOME/.vee/bin/vee"'
            echo 'xattr -d com.apple.quarantine "$HOME/.vee/bin/vee" 2>/dev/null || true   # unsigned binary'
            echo '```'
            echo
            echo "### Windows (PowerShell)"
            echo
            echo '```powershell'
            echo "iwr ${REL}/vee-${TAG}-windows-amd64.tar.gz -OutFile vee.tar.gz"
            echo 'tar xzf vee.tar.gz'
            echo 'New-Item -ItemType Directory -Force "$HOME\.vee\bin" | Out-Null'
            echo 'Move-Item -Force vee.exe "$HOME\.vee\bin\vee.exe"'
            echo '```'
            echo
            echo 'Verify the install: `vee --help`'
            echo
            echo "## Run as a daemon (Linux)"
            echo
            echo "The daemon autostarts VMs on boot and stops them cleanly on host shutdown:"
            echo
            echo '```sh'
            echo 'vee daemon install               # writes /etc/systemd/system/vee.service, enables + starts it'
            echo 'sudo systemctl restart vee       # after upgrading the vee binary in place'
            echo 'sudo systemctl status vee        # check it'"'"'s running'
            echo '```'
            echo
            echo "After upgrading, restart the daemon so it runs the new binary. If the new binary lands at a different path, re-run \`vee daemon install\`."
          } > body.md
          cat body.md

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: body.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
