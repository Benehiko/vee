name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      # golangci-lint v2 (the .golangci.yml is version: "2"). The action must be
      # v7+ to install a v2 linter; v6 shipped v1.64.x, which cannot read a v2
      # config and is built against an older Go than the module targets.
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m
      # Enforce formatting (gofumpt + goimports) — a non-empty diff means someone
      # committed unformatted code. Fail the job and show the diff.
      - name: Format check
        run: |
          golangci-lint fmt --diff

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build -mod=vendor ./...
      - name: Test
        run: go test -mod=vendor -race ./...

  build-and-test-macos:
    # Apple Silicon: guards the macOS (HVF/aarch64/cocoa) port so the build-tag
    # split and host-aware defaults keep compiling and passing on darwin.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: go build -mod=vendor ./...
      - name: Test
        run: go test -mod=vendor -race ./...

  build-windows:
    # Windows (WHPX/x86_64) port: cross-compile from Linux so the windows/amd64
    # build-tag split (loopback-TCP control channel, no-op VFIO/vsock/pinning,
    # native ISO writer) keeps compiling. This gate prevents the Windows port
    # from silently rotting; runtime tests still run on ubuntu/macos above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -mod=vendor ./...
      - name: Vet (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go vet -mod=vendor ./...
